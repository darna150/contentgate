name: Live E2E QA

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "ContentGate URL to test"
        required: false
        default: "https://contentgate-delta.vercel.app"
  schedule:
    - cron: "41 2 * * *"

permissions:
  contents: read

jobs:
  live-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CONTENTGATE_E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://contentgate-delta.vercel.app' }}
      CONTENTGATE_E2E_EMAIL: ${{ secrets.CONTENTGATE_E2E_EMAIL }}
      CONTENTGATE_E2E_PASSWORD: ${{ secrets.CONTENTGATE_E2E_PASSWORD }}
      CONTENTGATE_E2E_ASSIGNMENT_ID: ${{ secrets.CONTENTGATE_E2E_ASSIGNMENT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Require live QA credentials
        run: |
          test -n "$CONTENTGATE_E2E_EMAIL"
          test -n "$CONTENTGATE_E2E_PASSWORD"
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
