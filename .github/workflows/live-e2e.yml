name: Live E2E QA

# Manual-only: the previous nightly schedule ran against production and wrote
# generation/approval records into the live tenant's immutable history. Live
# E2E must now name its target explicitly — point it at a Vercel Preview
# deployment or a dedicated QA environment, never production.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "ContentGate URL to test (use a Preview deployment or QA environment, not production)"
        required: true

permissions:
  contents: read

jobs:
  live-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CONTENTGATE_E2E_BASE_URL: ${{ github.event.inputs.base_url }}
      CONTENTGATE_E2E_EMAIL: ${{ secrets.CONTENTGATE_E2E_EMAIL }}
      CONTENTGATE_E2E_PASSWORD: ${{ secrets.CONTENTGATE_E2E_PASSWORD }}
      CONTENTGATE_E2E_ASSIGNMENT_ID: ${{ secrets.CONTENTGATE_E2E_ASSIGNMENT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Refuse to run against production
        run: |
          case "$CONTENTGATE_E2E_BASE_URL" in
            https://contentgate-delta.vercel.app*)
              echo "Live E2E may not target production." >&2
              exit 1
              ;;
          esac
      - name: Require live QA credentials
        run: |
          test -n "$CONTENTGATE_E2E_EMAIL"
          test -n "$CONTENTGATE_E2E_PASSWORD"
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
